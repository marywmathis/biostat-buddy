site_name: BioStat Buddy
site_description: Biostatistics in plain English for undergraduate public health majors
site_name: BioStat Buddy
site_description: Biostatistics in plain English for undergraduate public health majors
docs_dir: docs
use_directory_urls: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Track 0 - Foundations:
      - Parameter vs. Statistic: foundations/parameter-vs-statistic.md
      - Population vs. Sample: foundations/population-vs-sample.md
      - Variable Types: foundations/variable-types.md
      - Greek Letter Decoder: foundations/greek-decoder.md
      - Math Refresher: foundations/math-refresher.md
      - JMP Quick Reference: foundations/jmp-quick-reference.md
      - Stats Vocabulary: foundations/stats-vocabulary.md
  - Track 1 - Studies & Data:
      - Study Designs: track-1-studies-and-data/ch2-study-designs.md
      - Quantifying Disease: track-1-studies-and-data/ch3-disease-extent.md
      - Summary Statistics: track-1-studies-and-data/ch4-summary-stats.md
      - Data Visualization: track-1-studies-and-data/ch12-data-viz.md
  - Track 2 - Probability:
      - Probability: track-2-probability/ch5-probability.md
  - Track 3 - Drawing Conclusions:
      - Confidence Intervals: track-3-conclusions/ch6-confidence-intervals.md
      - Hypothesis Testing: track-3-conclusions/ch7-hypothesis-testing.md
      - Power & Sample Size: track-3-conclusions/ch8-power-sample-size.md
      - Nonparametric Tests: track-3-conclusions/ch10-nonparametric.md
  - Track 4 - Real-World Research:
      - Multivariable Methods: track-4-real-world/ch9-multivariable.md
      - Survival Analysis: track-4-real-world/ch11-survival.md
  - Interactive Lab: interactive-lab.html
  - Decision Helpers:
      - Which Study Design?: decision-helpers/which-study-design.md
      - Which Summary Statistic?: decision-helpers/which-summary-stat.md
      - Which Hypothesis Test?: decision-helpers/which-test.md
  - The Translator: translator.md
  - Going Further: going-further.md

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
