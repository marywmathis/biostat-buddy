<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540">
<text x="340" y="30" font-family="sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#3D3D3A">The CI–test duality: your CI already answers the test</text>
<text x="340" y="52" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#73726c">If μ₀ falls inside your 95% CI → fail to reject. If μ₀ falls outside → reject. Same answer, two methods.</text>
<rect x="15" y="65" width="650" height="175" rx="6" fill="#F8FAFD" stroke="#185FA5" stroke-width="0.8"/>
<text x="340" y="85" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#185FA5">Scenario A: Testing H₀: μ = 5 (industry benchmark)</text>
<text x="340" y="102" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#73726c">Sample data: x̄ = 5.4 days, n = 10, 95% CI = (2.9, 7.9)</text>
<text x="350" y="122" font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#993C1D">μ₀ = 5</text>
<line x1="350" y1="128" x2="350" y2="180" stroke="#993C1D" stroke-width="2.5"/>
<line x1="237" y1="150" x2="507" y2="150" stroke="#185FA5" stroke-width="5"/>
<line x1="237" y1="143" x2="237" y2="157" stroke="#185FA5" stroke-width="2"/>
<line x1="507" y1="143" x2="507" y2="157" stroke="#185FA5" stroke-width="2"/>
<circle cx="372" cy="150" r="6" fill="#185FA5"/>
<text x="237" y="138" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#185FA5">2.9</text>
<text x="507" y="138" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#185FA5">7.9</text>
<line x1="80" y1="175" x2="620" y2="175" stroke="#3D3D3A" stroke-width="0.8"/>
<line x1="80" y1="173" x2="80" y2="178" stroke="#3D3D3A"/>
<line x1="134" y1="173" x2="134" y2="178" stroke="#3D3D3A"/>
<line x1="188" y1="173" x2="188" y2="178" stroke="#3D3D3A"/>
<line x1="242" y1="173" x2="242" y2="178" stroke="#3D3D3A"/>
<line x1="296" y1="173" x2="296" y2="178" stroke="#3D3D3A"/>
<line x1="350" y1="173" x2="350" y2="178" stroke="#3D3D3A"/>
<line x1="404" y1="173" x2="404" y2="178" stroke="#3D3D3A"/>
<line x1="458" y1="173" x2="458" y2="178" stroke="#3D3D3A"/>
<line x1="512" y1="173" x2="512" y2="178" stroke="#3D3D3A"/>
<line x1="566" y1="173" x2="566" y2="178" stroke="#3D3D3A"/>
<line x1="620" y1="173" x2="620" y2="178" stroke="#3D3D3A"/>
<text x="80" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">0</text>
<text x="134" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">1</text>
<text x="188" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">2</text>
<text x="242" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">3</text>
<text x="296" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">4</text>
<text x="350" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">5</text>
<text x="404" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">6</text>
<text x="458" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">7</text>
<text x="512" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">8</text>
<text x="566" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">9</text>
<text x="620" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">10</text>
<rect x="25" y="208" width="630" height="25" rx="3" fill="#EBF3FB" stroke="#185FA5" stroke-width="0.7"/>
<text x="340" y="225" font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#185FA5">μ₀ = 5 lands INSIDE the CI → FAIL TO REJECT H₀ at α = 0.05</text>
<rect x="15" y="255" width="650" height="175" rx="6" fill="#FDF8F5" stroke="#993C1D" stroke-width="0.8"/>
<text x="340" y="275" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#993C1D">Scenario B: Testing H₀: μ = 9 (different benchmark)</text>
<text x="340" y="292" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#73726c">Same sample data: x̄ = 5.4 days, n = 10, 95% CI = (2.9, 7.9)</text>
<text x="566" y="312" font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#993C1D">μ₀ = 9</text>
<line x1="566" y1="318" x2="566" y2="370" stroke="#993C1D" stroke-width="2.5"/>
<line x1="237" y1="340" x2="507" y2="340" stroke="#185FA5" stroke-width="5"/>
<line x1="237" y1="333" x2="237" y2="347" stroke="#185FA5" stroke-width="2"/>
<line x1="507" y1="333" x2="507" y2="347" stroke="#185FA5" stroke-width="2"/>
<circle cx="372" cy="340" r="6" fill="#185FA5"/>
<text x="237" y="328" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#185FA5">2.9</text>
<text x="507" y="328" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#185FA5">7.9</text>
<line x1="80" y1="365" x2="620" y2="365" stroke="#3D3D3A" stroke-width="0.8"/>
<line x1="80" y1="363" x2="80" y2="368" stroke="#3D3D3A"/>
<line x1="134" y1="363" x2="134" y2="368" stroke="#3D3D3A"/>
<line x1="188" y1="363" x2="188" y2="368" stroke="#3D3D3A"/>
<line x1="242" y1="363" x2="242" y2="368" stroke="#3D3D3A"/>
<line x1="296" y1="363" x2="296" y2="368" stroke="#3D3D3A"/>
<line x1="350" y1="363" x2="350" y2="368" stroke="#3D3D3A"/>
