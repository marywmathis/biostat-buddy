<line x1="458" y1="363" x2="458" y2="368" stroke="#3D3D3A"/>
<line x1="512" y1="363" x2="512" y2="368" stroke="#3D3D3A"/>
<line x1="566" y1="363" x2="566" y2="368" stroke="#3D3D3A"/>
<line x1="620" y1="363" x2="620" y2="368" stroke="#3D3D3A"/>
<text x="80" y="380" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">0</text>
<text x="134" y="380" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">1</text>
<text x="188" y="380" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">2</text>
<text x="242" y="380" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">3</text>
<text x="296" y="380" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">4</text>
<text x="350" y="380" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">5</text>
<text x="404" y="380" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">6</text>
<text x="458" y="380" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">7</text>
<text x="512" y="380" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">8</text>
<text x="566" y="380" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">9</text>
<text x="620" y="380" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">10</text>
<rect x="25" y="398" width="630" height="25" rx="3" fill="#FCEFE2" stroke="#993C1D" stroke-width="0.7"/>
<text x="340" y="415" font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#993C1D">μ₀ = 9 lands OUTSIDE the CI → REJECT H₀ at α = 0.05</text>
<rect x="15" y="445" width="650" height="85" rx="6" fill="#F5F0E6" stroke="#73726c" stroke-width="0.5"/>
<text x="340" y="465" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#3D3D3A">The CI–test duality rule</text>
<text x="40" y="487" font-family="sans-serif" font-size="11" fill="#3D3D3A">• If μ₀ is INSIDE the (1−α) CI → fail to reject H₀ at level α</text>
<text x="40" y="503" font-family="sans-serif" font-size="11" fill="#3D3D3A">• If μ₀ is OUTSIDE the (1−α) CI → reject H₀ at level α</text>
<text x="40" y="522" font-family="sans-serif" font-size="11" font-weight="700" fill="#185FA5">Practical use: once you've built a CI, you've already done the two-sided test for free.</text>
</svg>