<text x="385" y="200" font-family="sans-serif" font-size="11" font-weight="500" text-anchor="middle" fill="#3D3D3A">drawn from</text>
<text x="340" y="365" font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#73726c">Each dot is symbolic — the visual shows the concept of population vs. sample, not literal counts.</text>
<text x="340" y="380" font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#73726c">The actual numbers (~350,000 and 300) are labeled in each box.</text>
<text x="340" y="415" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#3D3D3A">The sample stands in for the population.</text>
<text x="340" y="437" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#3D3D3A">We measure 300 students to learn about hundreds of thousands.</text>
<text x="340" y="465" font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#73726c">Every conclusion about the population is an educated guess based on the sample.</text>
<text x="340" y="483" font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#73726c">The whole job of inferential statistics is to bridge that gap honestly.</text>
