<svg width="100%" viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg" role="img"><title>Linear vs logistic regression</title>

<text x="350" y="22" font-family="sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#3D3D3A">Linear vs logistic regression</text>
<text x="350" y="44" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#73726c">Two flavors of regression — depending on what kind of outcome you're predicting</text>

<rect x="15" y="60" width="325" height="345" rx="6" fill="#FFFFFF" stroke="#73726c" stroke-width="0.7"/>
<text x="177" y="80" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#185FA5">Linear regression</text>
<text x="177" y="98" font-family="sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#5F5E5A">continuous outcome (length of stay)</text>

<rect x="55" y="120" width="270" height="200" fill="#FAFAFA" stroke="#D3D1C7" stroke-width="0.4"/>
<line x1="55" y1="220" x2="325" y2="220" stroke="#E8E8E5" stroke-width="0.5"/>
<line x1="55" y1="170" x2="325" y2="170" stroke="#E8E8E5" stroke-width="0.5"/>
<line x1="55" y1="270" x2="325" y2="270" stroke="#E8E8E5" stroke-width="0.5"/>
<line x1="145" y1="120" x2="145" y2="320" stroke="#E8E8E5" stroke-width="0.5"/>
<line x1="235" y1="120" x2="235" y2="320" stroke="#E8E8E5" stroke-width="0.5"/>

<text x="45" y="324" font-family="sans-serif" font-size="9" text-anchor="end" fill="#5F5E5A">0</text>
<text x="45" y="224" font-family="sans-serif" font-size="9" text-anchor="end" fill="#5F5E5A">5</text>
<text x="45" y="124" font-family="sans-serif" font-size="9" text-anchor="end" fill="#5F5E5A">10</text>
<text x="55" y="335" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#5F5E5A">20</text>
<text x="145" y="335" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#5F5E5A">40</text>
<text x="235" y="335" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#5F5E5A">60</text>
<text x="325" y="335" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#5F5E5A">80</text>

<text x="190" y="358" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#3D3D3A">Age (years)</text>
<text x="25" y="220" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#3D3D3A" transform="rotate(-90, 25, 220)">Length of stay (days)</text>

<line x1="55" y1="270" x2="325" y2="150" stroke="#185FA5" stroke-width="2.2"/>

<circle cx="77.5" cy="274" r="4" fill="#185FA5" fill-opacity="0.75"/>
<circle cx="100" cy="260" r="4" fill="#185FA5" fill-opacity="0.75"/>
<circle cx="122.5" cy="252" r="4" fill="#185FA5" fill-opacity="0.75"/>
<circle cx="145" cy="246" r="4" fill="#185FA5" fill-opacity="0.75"/>
<circle cx="167.5" cy="230" r="4" fill="#185FA5" fill-opacity="0.75"/>
<circle cx="190" cy="236" r="4" fill="#185FA5" fill-opacity="0.75"/>
<circle cx="212.5" cy="220" r="4" fill="#185FA5" fill-opacity="0.75"/>
<circle cx="235" cy="200" r="4" fill="#185FA5" fill-opacity="0.75"/>
<circle cx="257.5" cy="196" r="4" fill="#185FA5" fill-opacity="0.75"/>
<circle cx="280" cy="190" r="4" fill="#185FA5" fill-opacity="0.75"/>
<circle cx="302.5" cy="168" r="4" fill="#185FA5" fill-opacity="0.75"/>

<text x="177" y="380" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#3D3D3A">Y = β₀ + β₁ × age</text>
<text x="177" y="398" font-family="sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#73726c">slope = expected change in days per year of age</text>

<rect x="360" y="60" width="325" height="345" rx="6" fill="#FFFFFF" stroke="#73726c" stroke-width="0.7"/>
<text x="522" y="80" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#993C1D">Logistic regression</text>
<text x="522" y="98" font-family="sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#5F5E5A">binary outcome (readmitted yes/no)</text>

<rect x="400" y="120" width="270" height="200" fill="#FAFAFA" stroke="#D3D1C7" stroke-width="0.4"/>
<line x1="400" y1="220" x2="670" y2="220" stroke="#E8E8E5" stroke-width="0.5"/>
<line x1="400" y1="170" x2="670" y2="170" stroke="#E8E8E5" stroke-width="0.5"/>
<line x1="400" y1="270" x2="670" y2="270" stroke="#E8E8E5" stroke-width="0.5"/>
<line x1="490" y1="120" x2="490" y2="320" stroke="#E8E8E5" stroke-width="0.5"/>
<line x1="580" y1="120" x2="580" y2="320" stroke="#E8E8E5" stroke-width="0.5"/>

<text x="390" y="324" font-family="sans-serif" font-size="9" text-anchor="end" fill="#5F5E5A">0 (no)</text>
<text x="390" y="224" font-family="sans-serif" font-size="9" text-anchor="end" fill="#5F5E5A">0.5</text>
<text x="390" y="124" font-family="sans-serif" font-size="9" text-anchor="end" fill="#5F5E5A">1 (yes)</text>
<text x="400" y="335" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#5F5E5A">20</text>
<text x="490" y="335" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#5F5E5A">40</text>
<text x="580" y="335" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#5F5E5A">60</text>
<text x="670" y="335" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#5F5E5A">80</text>

<text x="535" y="358" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#3D3D3A">Age (years)</text>
<text x="370" y="220" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#3D3D3A" transform="rotate(-90, 370, 220)">Readmitted within 30 days</text>

<path d="M 400 318.7 L 422.5 317.2 L 445 314.2 L 467.5 308 L 490 296.2 L 512.5 275.4 L 535 244.4 L 557.5 207.6 L 580 173.8 L 602.5 149.6 L 625 135.2 L 647.5 127.4 L 670 123.6" fill="none" stroke="#993C1D" stroke-width="2.2"/>

<circle cx="436" cy="320" r="4" fill="#993C1D" fill-opacity="0.75"/>
<circle cx="454" cy="320" r="4" fill="#993C1D" fill-opacity="0.75"/>
<circle cx="467.5" cy="320" r="4" fill="#993C1D" fill-opacity="0.75"/>
<circle cx="481" cy="320" r="4" fill="#993C1D" fill-opacity="0.75"/>
<circle cx="490" cy="320" r="4" fill="#993C1D" fill-opacity="0.75"/>
<circle cx="503.5" cy="120" r="4" fill="#993C1D" fill-opacity="0.75"/>
<circle cx="517" cy="320" r="4" fill="#993C1D" fill-opacity="0.75"/>
<circle cx="535" cy="320" r="4" fill="#993C1D" fill-opacity="0.75"/>
<circle cx="544" cy="120" r="4" fill="#993C1D" fill-opacity="0.75"/>
<circle cx="557.5" cy="120" r="4" fill="#993C1D" fill-opacity="0.75"/>
<circle cx="571" cy="320" r="4" fill="#993C1D" fill-opacity="0.75"/>
<circle cx="584.5" cy="120" r="4" fill="#993C1D" fill-opacity="0.75"/>
<circle cx="598" cy="120" r="4" fill="#993C1D" fill-opacity="0.75"/>
<circle cx="611.5" cy="120" r="4" fill="#993C1D" fill-opacity="0.75"/>
<circle cx="625" cy="320" r="4" fill="#993C1D" fill-opacity="0.75"/>
<circle cx="643" cy="120" r="4" fill="#993C1D" fill-opacity="0.75"/>
<circle cx="661" cy="120" r="4" fill="#993C1D" fill-opacity="0.75"/>

<text x="522" y="380" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#3D3D3A">log(p / 1−p) = β₀ + β₁ × age</text>
<text x="522" y="398" font-family="sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#73726c">curve = predicted probability of readmission</text>

<rect x="20" y="416" width="660" height="38" rx="4" fill="#F5F0E6" stroke="#A87B3D" stroke-width="0.8"/>
<text x="350" y="433" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#3D3D3A">Linear when the outcome is a number; logistic when it's yes/no.</text>
<text x="350" y="448" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">In public health, binary outcomes dominate — so logistic is the workhorse.</text>
</svg>