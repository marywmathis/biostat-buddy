<svg width="100%" viewBox="0 0 700 410" xmlns="http://www.w3.org/2000/svg" role="img"><title>When parametric tests are in trouble</title>

<defs>
<marker id="arrowamber" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M 0 0 L 6 3 L 0 6 Z" fill="#A87B3D"/></marker>
<marker id="arrowred" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M 0 0 L 6 3 L 0 6 Z" fill="#993C1D"/></marker>
</defs>

<text x="350" y="22" font-family="sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#3D3D3A">When parametric tests are in trouble</text>
<text x="350" y="44" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#73726c">What a t-test does in three different distribution shapes</text>

<rect x="18" y="58" width="215" height="337" rx="6" fill="#E6F3F0" stroke="#2D8460" stroke-width="0.8"/>
<text x="125" y="82" font-family="sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#0A4C3B">t-test works fine</text>
<text x="125" y="100" font-family="sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#5F5E5A">symmetric, clean (height, BP)</text>

<path d="M 35 250 C 80 250, 105 130, 125 130 C 145 130, 170 250, 215 250 Z" fill="#B8D4ED" fill-opacity="0.5"/>
<path d="M 35 250 C 80 250, 105 130, 125 130 C 145 130, 170 250, 215 250" fill="none" stroke="#185FA5" stroke-width="1.8"/>
<line x1="125" y1="130" x2="125" y2="250" stroke="#3D3D3A" stroke-width="1.5" stroke-dasharray="4 2"/>
<text x="125" y="120" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#3D3D3A">mean = median</text>

<text x="125" y="290" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">Mean and median agree,</text>
<text x="125" y="305" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">both describe the typical case.</text>
<text x="125" y="328" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">Variance is well-defined,</text>
<text x="125" y="343" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">SE is a meaningful summary,</text>
<text x="125" y="358" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">and the t-statistic behaves</text>
<text x="125" y="373" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">like the math expects.</text>

<rect x="243" y="58" width="215" height="337" rx="6" fill="#FFEDD0" stroke="#A87B3D" stroke-width="0.8"/>
<text x="350" y="82" font-family="sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#73511D">t-test misleads</text>
<text x="350" y="100" font-family="sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#5F5E5A">right-skewed (LOS, cost, income)</text>

<path d="M 265 250 C 278 250, 285 130, 295 130 C 308 130, 338 175, 385 215 C 415 240, 435 248, 450 250 Z" fill="#F4C0AE" fill-opacity="0.5"/>
<path d="M 265 250 C 278 250, 285 130, 295 130 C 308 130, 338 175, 385 215 C 415 240, 435 248, 450 250" fill="none" stroke="#993C1D" stroke-width="1.8"/>

<line x1="325" y1="170" x2="325" y2="250" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="4 2"/>
<text x="325" y="120" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#185FA5">median</text>

<line x1="365" y1="200" x2="365" y2="250" stroke="#993C1D" stroke-width="1.5" stroke-dasharray="4 2"/>
<text x="365" y="108" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#993C1D">mean</text>

<path d="M 332 145 Q 345 135, 358 145" fill="none" stroke="#A87B3D" stroke-width="1.2" marker-end="url(#arrowamber)"/>

<text x="350" y="290" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">Long tail drags the mean</text>
<text x="350" y="305" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">to the right. Median stays</text>
<text x="350" y="320" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">where most patients are.</text>
<text x="350" y="343" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">The t-test is testing an</text>
<text x="350" y="358" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">"average" that doesn't</text>
<text x="350" y="373" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">describe a typical case.</text>

<rect x="468" y="58" width="215" height="337" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text x="575" y="82" font-family="sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#5C2410">t-test unstable</text>
<text x="575" y="100" font-family="sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#5F5E5A">outliers (lab errors, costs)</text>

<path d="M 485 250 C 520 250, 530 130, 545 130 C 560 130, 570 250, 605 250 Z" fill="#B8D4ED" fill-opacity="0.5"/>
<path d="M 485 250 C 520 250, 530 130, 545 130 C 560 130, 570 250, 605 250" fill="none" stroke="#185FA5" stroke-width="1.8"/>

<circle cx="660" cy="250" r="4" fill="#993C1D" stroke="#5C2410" stroke-width="0.5"/>
<text x="660" y="266" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#5C2410">outlier</text>

<line x1="545" y1="130" x2="545" y2="250" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="4 2"/>
<text x="540" y="120" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="end" fill="#185FA5">median</text>

<line x1="585" y1="190" x2="585" y2="250" stroke="#993C1D" stroke-width="1.5" stroke-dasharray="4 2"/>
<text x="592" y="178" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="start" fill="#993C1D">mean</text>

<path d="M 553 140 Q 569 132, 583 175" fill="none" stroke="#993C1D" stroke-width="1.2" marker-end="url(#arrowred)"/>

<text x="575" y="290" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">One extreme value drags</text>
<text x="575" y="305" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">the mean AND inflates the SD.</text>
<text x="575" y="328" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">The t-statistic can flip</text>
<text x="575" y="343" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">significance with one data</text>
<text x="575" y="358" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">point added or removed.</text>
<text x="575" y="375" font-family="sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#5C2410">The median barely moves.</text>
</svg>