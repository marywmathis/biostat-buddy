<text x="350" y="472" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">Value being estimated</text>
<rect x="15" y="485" width="650" height="105" rx="6" fill="#F5F0E6" stroke="#73726c" stroke-width="0.5"/>
<text x="340" y="505" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#3D3D3A">The crucial distinction</text>
<text x="35" y="528" font-family="sans-serif" font-size="11" fill="#993C1D"><tspan font-weight="700">✗ WRONG (what most students assume):</tspan> "There is a 95% chance that μ is in THIS specific interval."</text>
<text x="35" y="552" font-family="sans-serif" font-size="11" fill="#0F6E56"><tspan font-weight="700">✓ RIGHT:</tspan> "If we repeated this procedure many times, 95% of resulting intervals would contain μ.</text>
<text x="35" y="567" font-family="sans-serif" font-size="11" fill="#0F6E56" font-style="italic">THIS particular interval — from our one actual study — either contains μ or it doesn't. We can't tell which."</text>
<text x="340" y="585" font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#73726c">The "95%" describes the long-run behavior of the procedure, not this one specific interval.</text>
</svg>