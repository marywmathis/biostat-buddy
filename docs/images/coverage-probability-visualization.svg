<text x="340" y="30" font-family="sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#3D3D3A">What "95% confidence" actually means</text>
<text x="340" y="52" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#73726c">If we ran the same study 20 times (different random sample each time), about 19 of our CIs would contain μ</text>
