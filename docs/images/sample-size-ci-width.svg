<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540">
<text x="340" y="30" font-family="sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#3D3D3A">Why larger samples give narrower confidence intervals</text>
<text x="340" y="52" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#73726c">Same point estimate, same confidence level — only sample size (n) changes</text>
<line x1="372" y1="100" x2="372" y2="295" stroke="#A87B3D" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="372" y="92" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#A87B3D">Point estimate = 5.4 days</text>
<text x="65" y="123" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="end" fill="#3D3D3A">n = 10</text>
<line x1="256" y1="120" x2="488" y2="120" stroke="#185FA5" stroke-width="4"/>
<line x1="256" y1="113" x2="256" y2="127" stroke="#185FA5" stroke-width="2"/>
<line x1="488" y1="113" x2="488" y2="127" stroke="#185FA5" stroke-width="2"/>
<circle cx="372" cy="120" r="5" fill="#185FA5"/>
<text x="510" y="123" font-family="sans-serif" font-size="11" font-weight="600" fill="#3D3D3A">ME = 2.15 (wide)</text>
<text x="65" y="173" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="end" fill="#3D3D3A">n = 25</text>
<line x1="298" y1="170" x2="445" y2="170" stroke="#185FA5" stroke-width="4"/>
<line x1="298" y1="163" x2="298" y2="177" stroke="#185FA5" stroke-width="2"/>
<line x1="445" y1="163" x2="445" y2="177" stroke="#185FA5" stroke-width="2"/>
<circle cx="372" cy="170" r="5" fill="#185FA5"/>
<text x="468" y="173" font-family="sans-serif" font-size="11" font-weight="600" fill="#3D3D3A">ME = 1.36</text>
<text x="65" y="223" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="end" fill="#3D3D3A">n = 100</text>
<line x1="335" y1="220" x2="408" y2="220" stroke="#185FA5" stroke-width="4"/>
<line x1="335" y1="213" x2="335" y2="227" stroke="#185FA5" stroke-width="2"/>
<line x1="408" y1="213" x2="408" y2="227" stroke="#185FA5" stroke-width="2"/>
<circle cx="372" cy="220" r="5" fill="#185FA5"/>
<text x="430" y="223" font-family="sans-serif" font-size="11" font-weight="600" fill="#3D3D3A">ME = 0.68</text>
<text x="65" y="273" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="end" fill="#3D3D3A">n = 400</text>
<line x1="353" y1="270" x2="390" y2="270" stroke="#185FA5" stroke-width="4"/>
<line x1="353" y1="263" x2="353" y2="277" stroke="#185FA5" stroke-width="2"/>
<line x1="390" y1="263" x2="390" y2="277" stroke="#185FA5" stroke-width="2"/>
<circle cx="372" cy="270" r="5" fill="#185FA5"/>
<text x="411" y="273" font-family="sans-serif" font-size="11" font-weight="600" fill="#3D3D3A">ME = 0.34 (narrow)</text>
<line x1="80" y1="310" x2="620" y2="310" stroke="#3D3D3A" stroke-width="0.8"/>
<line x1="80" y1="308" x2="80" y2="314" stroke="#3D3D3A" stroke-width="0.5"/>
<line x1="134" y1="308" x2="134" y2="314" stroke="#3D3D3A" stroke-width="0.5"/>
<line x1="188" y1="308" x2="188" y2="314" stroke="#3D3D3A" stroke-width="0.5"/>
<line x1="242" y1="308" x2="242" y2="314" stroke="#3D3D3A" stroke-width="0.5"/>
<line x1="296" y1="308" x2="296" y2="314" stroke="#3D3D3A" stroke-width="0.5"/>
<line x1="350" y1="308" x2="350" y2="314" stroke="#3D3D3A" stroke-width="0.5"/>
<line x1="404" y1="308" x2="404" y2="314" stroke="#3D3D3A" stroke-width="0.5"/>
<line x1="458" y1="308" x2="458" y2="314" stroke="#3D3D3A" stroke-width="0.5"/>
<line x1="512" y1="308" x2="512" y2="314" stroke="#3D3D3A" stroke-width="0.5"/>
<line x1="566" y1="308" x2="566" y2="314" stroke="#3D3D3A" stroke-width="0.5"/>
<line x1="620" y1="308" x2="620" y2="314" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="80" y="327" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">0</text>
<text x="134" y="327" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">1</text>
<text x="188" y="327" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">2</text>
<text x="242" y="327" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">3</text>
<text x="296" y="327" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">4</text>
<text x="350" y="327" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">5</text>
<text x="404" y="327" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">6</text>
<text x="458" y="327" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">7</text>
<text x="512" y="327" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">8</text>
<text x="566" y="327" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">9</text>
<text x="620" y="327" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#73726c">10</text>
<text x="340" y="345" font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#3D3D3A">Length of stay (days)</text>
<rect x="20" y="370" width="640" height="155" rx="6" fill="#F5F0E6" stroke="#73726c" stroke-width="0.5"/>
<text x="340" y="393" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#3D3D3A">Why does sample size matter so much?</text>
<text x="340" y="420" font-family="sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#185FA5">SE = s / √n</text>
<text x="340" y="442" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">The standard error has √n in the denominator. As n grows, SE shrinks.</text>
<text x="340" y="462" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">Smaller SE → smaller margin of error → narrower (more precise) CI.</text>
<text x="340" y="490" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#993C1D">Important: to HALVE the margin of error, you must QUADRUPLE the sample size.</text>
<text x="340" y="510" font-family="sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#73726c">(That's why scaling research is hard — twice the data doesn't give you twice the precision.)</text>
</svg>