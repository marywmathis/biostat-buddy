<svg width="100%" viewBox="0 0 700 410" xmlns="http://www.w3.org/2000/svg" role="img"><title>Nonparametric tests at a glance</title>

<text x="350" y="22" font-family="sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#3D3D3A">Nonparametric tests at a glance</text>
<text x="350" y="44" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#73726c">Each common parametric test paired with its distribution-free counterpart</text>

<rect x="20" y="70" width="660" height="326" rx="6" fill="#FFFFFF" stroke="#73726c" stroke-width="0.7"/>

<rect x="20" y="70" width="660" height="38" fill="#F5F0E6"/>
<rect x="220" y="108" width="160" height="288" fill="#EBF3FB" fill-opacity="0.55"/>
<rect x="380" y="108" width="165" height="288" fill="#FFEDD0" fill-opacity="0.5"/>

<line x1="220" y1="70" x2="220" y2="396" stroke="#D3D1C7" stroke-width="0.7"/>
<line x1="380" y1="70" x2="380" y2="396" stroke="#D3D1C7" stroke-width="0.7"/>
<line x1="545" y1="70" x2="545" y2="396" stroke="#D3D1C7" stroke-width="0.7"/>

<text x="120" y="93" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#3D3D3A">SCENARIO</text>
<text x="300" y="93" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#0A2B4A">PARAMETRIC TEST</text>
<text x="462" y="93" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#5C2410">NONPARAMETRIC TEST</text>
<text x="612" y="93" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#3D3D3A">TESTS WHAT</text>

<line x1="20" y1="108" x2="680" y2="108" stroke="#A87B3D" stroke-width="1.2"/>

<text x="30" y="136" font-family="sans-serif" font-size="11" font-weight="700" fill="#3D3D3A">Single / paired sample</text>
<text x="30" y="153" font-family="sans-serif" font-size="10" font-style="italic" fill="#5F5E5A">before vs after, or vs a benchmark</text>
<text x="300" y="143" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#185FA5">One-sample /</text>
<text x="300" y="160" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#185FA5">paired t-test</text>
<text x="462" y="143" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#993C1D">Wilcoxon</text>
<text x="462" y="160" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#993C1D">signed-rank</text>
<text x="612" y="143" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">Median of</text>
<text x="612" y="160" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">the differences</text>

<line x1="20" y1="180" x2="680" y2="180" stroke="#E8E6DD" stroke-width="0.5"/>

<text x="30" y="208" font-family="sans-serif" font-size="11" font-weight="700" fill="#3D3D3A">Two independent groups</text>
<text x="30" y="225" font-family="sans-serif" font-size="10" font-style="italic" fill="#5F5E5A">treatment vs control, A vs B</text>
<text x="300" y="215" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#185FA5">Two-sample</text>
<text x="300" y="232" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#185FA5">(independent) t-test</text>
<text x="462" y="215" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#993C1D">Mann-Whitney U</text>
<text x="462" y="232" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#993C1D">(= Wilcoxon rank-sum)</text>
<text x="612" y="215" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">Whether one</text>
<text x="612" y="232" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">group tends larger</text>

<line x1="20" y1="252" x2="680" y2="252" stroke="#E8E6DD" stroke-width="0.5"/>

<text x="30" y="280" font-family="sans-serif" font-size="11" font-weight="700" fill="#3D3D3A">Three or more groups</text>
<text x="30" y="297" font-family="sans-serif" font-size="10" font-style="italic" fill="#5F5E5A">three drug arms, four sites</text>
<text x="300" y="287" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#185FA5">One-way ANOVA</text>
<text x="462" y="287" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#993C1D">Kruskal-Wallis</text>
<text x="612" y="287" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">Whether any</text>
<text x="612" y="304" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">group differs</text>

<line x1="20" y1="324" x2="680" y2="324" stroke="#E8E6DD" stroke-width="0.5"/>

<text x="30" y="352" font-family="sans-serif" font-size="11" font-weight="700" fill="#3D3D3A">Two continuous variables</text>
<text x="30" y="369" font-family="sans-serif" font-size="10" font-style="italic" fill="#5F5E5A">age vs blood pressure</text>
<text x="300" y="359" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#185FA5">Pearson correlation</text>
<text x="462" y="359" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#993C1D">Spearman correlation</text>
<text x="612" y="359" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">Monotonic</text>
<text x="612" y="376" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">association</text>
</svg>