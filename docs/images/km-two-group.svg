<svg width="100%" viewBox="0 0 680 370" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Kaplan-Meier survival curves for two groups</title>
<desc>Two KM step-function curves. Group A terracotta solid, Group B teal dashed. Grey tick marks show censored participants — those who left the study still event-free.</desc>

<line x1="80" y1="40" x2="80" y2="290" stroke="#888780" stroke-width="0.75"/>
<line x1="80" y1="290" x2="620" y2="290" stroke="#888780" stroke-width="0.75"/>

<text font-family="sans-serif" font-size="12" fill="#888780" x="20" y="168" text-anchor="middle" transform="rotate(-90,20,168)">Survival probability S(t)</text>
<text font-family="sans-serif" font-size="12" fill="#888780" x="350" y="330" text-anchor="middle">Months since discharge</text>

<line x1="75" y1="290" x2="80" y2="290" stroke="#888780" stroke-width="0.75"/>
<text font-family="sans-serif" font-size="11" fill="#888780" x="68" y="294" text-anchor="end">0.0</text>
<line x1="75" y1="228" x2="620" y2="228" stroke="#888780" stroke-width="0.4" stroke-dasharray="3 4"/>
<text font-family="sans-serif" font-size="11" fill="#888780" x="68" y="232" text-anchor="end">0.25</text>
<line x1="75" y1="165" x2="620" y2="165" stroke="#888780" stroke-width="0.4" stroke-dasharray="3 4"/>
<text font-family="sans-serif" font-size="11" fill="#888780" x="68" y="169" text-anchor="end">0.50</text>
<line x1="75" y1="103" x2="620" y2="103" stroke="#888780" stroke-width="0.4" stroke-dasharray="3 4"/>
<text font-family="sans-serif" font-size="11" fill="#888780" x="68" y="107" text-anchor="end">0.75</text>
<line x1="75" y1="40" x2="80" y2="40" stroke="#888780" stroke-width="0.75"/>
<text font-family="sans-serif" font-size="11" fill="#888780" x="68" y="44" text-anchor="end">1.0</text>

<line x1="80" y1="290" x2="80" y2="296" stroke="#888780" stroke-width="0.75"/>
<text font-family="sans-serif" font-size="11" fill="#888780" x="80" y="308" text-anchor="middle">0</text>
<line x1="192" y1="290" x2="192" y2="296" stroke="#888780" stroke-width="0.75"/>
<text font-family="sans-serif" font-size="11" fill="#888780" x="192" y="308" text-anchor="middle">4</text>
<line x1="304" y1="290" x2="304" y2="296" stroke="#888780" stroke-width="0.75"/>
<text font-family="sans-serif" font-size="11" fill="#888780" x="304" y="308" text-anchor="middle">8</text>
<line x1="416" y1="290" x2="416" y2="296" stroke="#888780" stroke-width="0.75"/>
<text font-family="sans-serif" font-size="11" fill="#888780" x="416" y="308" text-anchor="middle">12</text>
<line x1="528" y1="290" x2="528" y2="296" stroke="#888780" stroke-width="0.75"/>
<text font-family="sans-serif" font-size="11" fill="#888780" x="528" y="308" text-anchor="middle">16</text>
<line x1="610" y1="290" x2="610" y2="296" stroke="#888780" stroke-width="0.75"/>
<text font-family="sans-serif" font-size="11" fill="#888780" x="610" y="308" text-anchor="middle">20</text>

<!-- GROUP A solid terracotta -->
<polyline fill="none" stroke="#B85C38" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
  points="80,40 136,40 136,60 220,60 220,80 304,80 304,95 388,95 388,110 472,110 472,120 556,120 556,127 610,127"/>

<!-- Group A censoring ticks — grey, 3 ticks -->
<line x1="178" y1="54" x2="178" y2="66" stroke="#888780" stroke-width="1.4"/>
<line x1="355" y1="89" x2="355" y2="101" stroke="#888780" stroke-width="1.4"/>
<line x1="510" y1="114" x2="510" y2="126" stroke="#888780" stroke-width="1.4"/>

<!-- GROUP B dashed teal -->
<polyline fill="none" stroke="#2D7A6A" stroke-width="2" stroke-dasharray="7 3" stroke-linecap="round" stroke-linejoin="round"
  points="80,40 136,40 136,77 192,77 192,115 248,115 248,145 332,145 332,175 416,175 416,200 528,200 528,220 610,220"/>

<!-- Group B censoring ticks — grey, 3 ticks -->
<line x1="165" y1="71" x2="165" y2="83" stroke="#888780" stroke-width="1.4"/>
<line x1="290" y1="139" x2="290" y2="151" stroke="#888780" stroke-width="1.4"/>
<line x1="472" y1="194" x2="472" y2="206" stroke="#888780" stroke-width="1.4"/>

<!-- Median reference lines Group B -->
<line x1="80" y1="165" x2="332" y2="165" stroke="#8B3A1F" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>
<line x1="332" y1="165" x2="332" y2="290" stroke="#8B3A1F" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>
<text font-family="sans-serif" font-size="11" fill="#8B3A1F" opacity="0.8" x="338" y="299">≈ month 8</text>
<text font-family="sans-serif" font-size="11" fill="#8B3A1F" opacity="0.8" x="84" y="162">Median (Group B)</text>

<!-- Legend — lower right -->
<rect x="345" y="220" width="265" height="66" rx="6" fill="#FDF1E2" stroke="#D4933E" stroke-width="0.75"/>
<line x1="359" y1="234" x2="359" y2="246" stroke="#888780" stroke-width="1.4"/>
<text font-family="sans-serif" font-size="11" fill="#888780" x="368" y="238">censored: participant left the study</text>
<text font-family="sans-serif" font-size="11" fill="#888780" x="368" y="251">while still event-free</text>
<line x1="359" y1="262" x2="383" y2="262" stroke="#B85C38" stroke-width="2.2"/>
<text font-family="sans-serif" font-size="11" fill="#2D2018" x="390" y="266">Group A — care coordination</text>
<line x1="359" y1="277" x2="383" y2="277" stroke="#2D7A6A" stroke-width="2" stroke-dasharray="6 3"/>
<text font-family="sans-serif" font-size="11" fill="#2D2018" x="390" y="281">Group B — usual care</text>
</svg>
