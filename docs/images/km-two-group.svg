<line x1="441" y1="222" x2="441" y2="258" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<line x1="441" y1="258" x2="595" y2="258" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<line x1="143" y1="63"  x2="143" y2="81"  stroke="#1D9E75" stroke-width="2" stroke-linecap="round"/>
<line x1="248" y1="141" x2="248" y2="159" stroke="#1D9E75" stroke-width="2" stroke-linecap="round"/>
<line x1="408" y1="213" x2="408" y2="231" stroke="#1D9E75" stroke-width="2" stroke-linecap="round"/>
