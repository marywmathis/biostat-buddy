<svg width="100%" viewBox="0 0 680 370" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Kaplan-Meier survival curves for two groups</title>
<desc>Two Kaplan-Meier step-function curves showing survival probability over 20 months. Group A (care coordination, terracotta) stays higher throughout follow-up. Group B (usual care, teal dashed) drops more steeply. Censoring tick marks appear on both curves.</desc>

<!-- Axes -->
<line x1="80" y1="40" x2="80" y2="290" stroke="#888780" stroke-width="0.75"/>
<line x1="80" y1="290" x2="620" y2="290" stroke="#888780" stroke-width="0.75"/>

<!-- Y-axis label -->
<text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" fill="#888780" x="20" y="168" text-anchor="middle" transform="rotate(-90,20,168)">Survival probability S(t)</text>

<!-- X-axis label -->
<text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" fill="#888780" x="350" y="330" text-anchor="middle">Months since discharge</text>

<!-- Y gridlines and ticks -->
<line x1="75" y1="290" x2="80" y2="290" stroke="#888780" stroke-width="0.75"/>
<text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#888780" x="68" y="294" text-anchor="end">0.0</text>

<line x1="75" y1="228" x2="620" y2="228" stroke="#888780" stroke-width="0.4" stroke-dasharray="3 4"/>
<text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#888780" x="68" y="232" text-anchor="end">0.25</text>

<line x1="75" y1="165" x2="620" y2="165" stroke="#888780" stroke-width="0.4" stroke-dasharray="3 4"/>
<text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#888780" x="68" y="169" text-anchor="end">0.50</text>

<line x1="75" y1="103" x2="620" y2="103" stroke="#888780" stroke-width="0.4" stroke-dasharray="3 4"/>
<text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#888780" x="68" y="107" text-anchor="end">0.75</text>

<line x1="75" y1="40" x2="80" y2="40" stroke="#888780" stroke-width="0.75"/>
<text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#888780" x="68" y="44" text-anchor="end">1.0</text>

<!-- X ticks -->
<line x1="80" y1="290" x2="80" y2="296" stroke="#888780" stroke-width="0.75"/>
<text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#888780" x="80" y="308" text-anchor="middle">0</text>

<line x1="192" y1="290" x2="192" y2="296" stroke="#888780" stroke-width="0.75"/>
<text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#888780" x="192" y="308" text-anchor="middle">4</text>

<line x1="304" y1="290" x2="304" y2="296" stroke="#888780" stroke-width="0.75"/>
<text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#888780" x="304" y="308" text-anchor="middle">8</text>

<line x1="416" y1="290" x2="416" y2="296" stroke="#888780" stroke-width="0.75"/>
<text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#888780" x="416" y="308" text-anchor="middle">12</text>

<line x1="528" y1="290" x2="528" y2="296" stroke="#888780" stroke-width="0.75"/>
<text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#888780" x="528" y="308" text-anchor="middle">16</text>

<line x1="610" y1="290" x2="610" y2="296" stroke="#888780" stroke-width="0.75"/>
<text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#888780" x="610" y="308" text-anchor="middle">20</text>

<!-- GROUP A: care coordination — terracotta #B85C38 -->
<polyline fill="none" stroke="#B85C38" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
  points="80,40 136,40 136,60 220,60 220,80 304,80 304,95 388,95 388,110 472,110 472,120 556,120 556,127 610,127"/>

<!-- Group A censoring ticks -->
<line x1="168" y1="48" x2="168" y2="60" stroke="#B85C38" stroke-width="1.2"/>
<line x1="262" y1="68" x2="262" y2="80" stroke="#B85C38" stroke-width="1.2"/>
<line x1="346" y1="83" x2="346" y2="95" stroke="#B85C38" stroke-width="1.2"/>
<line x1="430" y1="98" x2="430" y2="110" stroke="#B85C38" stroke-width="1.2"/>
<line x1="514" y1="113" x2="514" y2="122" stroke="#B85C38" stroke-width="1.2"/>
<line x1="585" y1="122" x2="585" y2="129" stroke="#B85C38" stroke-width="1.2"/>

<!-- GROUP B: usual care — teal #2D7A6A dashed -->
<polyline fill="none" stroke="#2D7A6A" stroke-width="2" stroke-dasharray="7 3" stroke-linecap="round" stroke-linejoin="round"
  points="80,40 136,40 136,77 192,77 192,115 248,115 248,145 332,145 332,175 416,175 416,200 528,200 528,220 610,220"/>

<!-- Group B censoring ticks -->
<line x1="160" y1="50" x2="160" y2="77" stroke="#2D7A6A" stroke-width="1.2"/>
<line x1="216" y1="90" x2="216" y2="115" stroke="#2D7A6A" stroke-width="1.2"/>
<line x1="290" y1="133" x2="290" y2="145" stroke="#2D7A6A" stroke-width="1.2"/>
<line x1="374" y1="163" x2="374" y2="175" stroke="#2D7A6A" stroke-width="1.2"/>
<line x1="470" y1="188" x2="470" y2="200" stroke="#2D7A6A" stroke-width="1.2"/>
<line x1="570" y1="210" x2="570" y2="220" stroke="#2D7A6A" stroke-width="1.2"/>

<!-- Median reference lines for Group B (S=0.50 at y=165, x≈332) -->
<line x1="80" y1="165" x2="332" y2="165" stroke="#8B3A1F" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>
<line x1="332" y1="165" x2="332" y2="290" stroke="#8B3A1F" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>
<text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#8B3A1F" opacity="0.8" x="338" y="299">≈ month 8</text>
<text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#8B3A1F" opacity="0.8" x="84" y="162">Median (Group B)</text>

<!-- Legend box — bottom right, below both curves -->
<rect x="390" y="230" width="218" height="52" rx="6" fill="#FDF1E2" stroke="#D4933E" stroke-width="0.75"/>
<line x1="434" y1="57" x2="434" y2="68" stroke="#888780" stroke-width="1.2"/>
<text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#888780" x="404" y="246">| = censored observation</text>
<line x1="404" y1="261" x2="430" y2="261" stroke="#B85C38" stroke-width="2.2"/>
<text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#2D2018" x="436" y="265">Group A — care coordination</text>
<line x1="404" y1="275" x2="430" y2="275" stroke="#2D7A6A" stroke-width="2" stroke-dasharray="6 3"/>
<text font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#2D2018" x="436" y="279">Group B — usual care</text>
</svg>
