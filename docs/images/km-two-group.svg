<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Kaplan-Meier survival curves for two groups</title>
<desc>Two step-function KM curves. Group A stays higher throughout. Group B drops faster. Censoring tick marks appear on both curves. Curves are labeled A and B at the right edge.</desc>
<line x1="80" y1="40" x2="80" y2="300" stroke="#888780" stroke-width="1" opacity="0.4"/>
<line x1="80" y1="300" x2="630" y2="300" stroke="#888780" stroke-width="1" opacity="0.4"/>
<line x1="78" y1="40"  x2="630" y2="40"  stroke="#888780" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.2"/>
<line x1="78" y1="100" x2="630" y2="100" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.2"/>
<line x1="78" y1="170" x2="630" y2="170" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.2"/>
<line x1="78" y1="235" x2="630" y2="235" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.2"/>
<text x="70" y="40"  text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#555550">1.0</text>
<text x="70" y="100" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#555550">0.75</text>
<text x="70" y="170" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#555550">0.50</text>
<text x="70" y="235" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#555550">0.25</text>
<text x="70" y="300" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#555550">0</text>
<line x1="80"  y1="300" x2="80"  y2="306" stroke="#888780" stroke-width="1" opacity="0.4"/>
<line x1="183" y1="300" x2="183" y2="306" stroke="#888780" stroke-width="1" opacity="0.4"/>
<line x1="286" y1="300" x2="286" y2="306" stroke="#888780" stroke-width="1" opacity="0.4"/>
<line x1="389" y1="300" x2="389" y2="306" stroke="#888780" stroke-width="1" opacity="0.4"/>
<line x1="492" y1="300" x2="492" y2="306" stroke="#888780" stroke-width="1" opacity="0.4"/>
<line x1="595" y1="300" x2="595" y2="306" stroke="#888780" stroke-width="1" opacity="0.4"/>
<text x="80"  y="318" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555550">0</text>
<text x="183" y="318" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555550">6</text>
<text x="286" y="318" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555550">12</text>
<text x="389" y="318" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555550">18</text>
<text x="492" y="318" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555550">24</text>
<text x="595" y="318" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555550">30</text>
<text x="350" y="338" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555550">Time (months)</text>
<text x="22" y="170" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555550" transform="rotate(-90,22,170)">Survival probability S(t)</text>
