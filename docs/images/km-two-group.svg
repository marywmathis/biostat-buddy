<line x1="100" y1="372" x2="130" y2="372" stroke="#888780" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
<line x1="115" y1="363" x2="115" y2="381" stroke="#888780" stroke-width="2" stroke-linecap="round"/>
<text x="140" y="372" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#555550">Censored observation — participant event-free at last contact</text>
</svg>
