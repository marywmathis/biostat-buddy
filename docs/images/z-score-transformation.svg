<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540">
<text x="340" y="30" font-family="sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#3D3D3A">From your data to z-scores: how the standard normal works for any data</text>
<text x="340" y="52" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#73726c">Standardizing lets us use one table for every normal distribution</text>
<rect x="15" y="75" width="285" height="285" rx="6" fill="#EBF3FB" stroke="#185FA5" stroke-width="1.5"/>
<text x="157" y="98" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#185FA5">Your original data</text>
<text x="157" y="115" font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#3D3D3A">e.g., blood pressure (μ=120, σ=15)</text>
<path d="M 35 290 C 75 290, 115 145, 157 145 C 199 145, 239 290, 280 290 Z" fill="#85B7EB" fill-opacity="0.5" stroke="#185FA5" stroke-width="1.5"/>
<line x1="25" y1="290" x2="290" y2="290" stroke="#3D3D3A" stroke-width="0.8"/>
<line x1="69" y1="288" x2="69" y2="294" stroke="#3D3D3A" stroke-width="1"/>
<line x1="113" y1="288" x2="113" y2="294" stroke="#3D3D3A" stroke-width="1"/>
<line x1="157" y1="288" x2="157" y2="294" stroke="#3D3D3A" stroke-width="1.5"/>
<line x1="201" y1="288" x2="201" y2="294" stroke="#3D3D3A" stroke-width="1"/>
<line x1="245" y1="288" x2="245" y2="294" stroke="#3D3D3A" stroke-width="1"/>
<text x="69" y="307" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">90</text>
<text x="113" y="307" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">105</text>
<text x="157" y="307" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#185FA5">120</text>
<text x="201" y="307" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">135</text>
<text x="245" y="307" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">150</text>
<line x1="245" y1="290" x2="245" y2="195" stroke="#993C1D" stroke-width="2"/>
<circle cx="245" cy="195" r="5" fill="#993C1D" stroke="#FFFFFF" stroke-width="1.5"/>
<text x="240" y="195" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="end" fill="#993C1D">150 mmHg</text>
<text x="157" y="335" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">Blood pressure (mmHg)</text>
<text x="157" y="352" font-family="sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#73726c">In real units, with mean 120 and σ 15</text>
<rect x="380" y="75" width="285" height="285" rx="6" fill="#FCF6E8" stroke="#A87B3D" stroke-width="1.5"/>
<text x="522" y="98" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#A87B3D">Standardized z-scores</text>
<text x="522" y="115" font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#3D3D3A">Standard normal (μ=0, σ=1)</text>
<path d="M 400 290 C 440 290, 480 145, 522 145 C 564 145, 604 290, 645 290 Z" fill="#E8C896" fill-opacity="0.5" stroke="#A87B3D" stroke-width="1.5"/>
<line x1="390" y1="290" x2="655" y2="290" stroke="#3D3D3A" stroke-width="0.8"/>
<line x1="434" y1="288" x2="434" y2="294" stroke="#3D3D3A" stroke-width="1"/>
<line x1="478" y1="288" x2="478" y2="294" stroke="#3D3D3A" stroke-width="1"/>
<line x1="522" y1="288" x2="522" y2="294" stroke="#3D3D3A" stroke-width="1.5"/>
<line x1="566" y1="288" x2="566" y2="294" stroke="#3D3D3A" stroke-width="1"/>
<line x1="610" y1="288" x2="610" y2="294" stroke="#3D3D3A" stroke-width="1"/>
<text x="434" y="307" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">−2</text>
<text x="478" y="307" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">−1</text>
<text x="522" y="307" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#A87B3D">0</text>
<text x="566" y="307" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">+1</text>
<text x="610" y="307" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">+2</text>
<line x1="610" y1="290" x2="610" y2="195" stroke="#993C1D" stroke-width="2"/>
<circle cx="610" cy="195" r="5" fill="#993C1D" stroke="#FFFFFF" stroke-width="1.5"/>
<text x="615" y="195" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="start" fill="#993C1D">z = 2</text>
<text x="522" y="335" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">z-values (each unit = 1 σ)</text>
<text x="522" y="352" font-family="sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#73726c">In standardized units — look these up in the z-table</text>
<rect x="270" y="155" width="140" height="55" rx="6" fill="#FFEDD0" stroke="#A87B3D" stroke-width="1.5"/>
<text x="340" y="174" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#A87B3D">Apply formula:</text>
<text x="340" y="195" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#A87B3D">z = (x − μ) / σ</text>
<path d="M 295 230 L 380 230" stroke="#3D3D3A" stroke-width="2.5" fill="none"/>
<polygon points="380 230, 374 226, 374 234" fill="#3D3D3A"/>
<text x="340" y="252" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#3D3D3A">Standardize</text>
<text x="340" y="268" font-family="sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#73726c">(subtract mean,</text>
<text x="340" y="282" font-family="sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#73726c">divide by σ)</text>
<rect x="15" y="380" width="650" height="145" rx="6" fill="#F5F0E6" stroke="#73726c" stroke-width="0.5"/>
<text x="340" y="402" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#3D3D3A">Worked example: standardizing a blood pressure of 150 mmHg</text>
<text x="35" y="427" font-family="sans-serif" font-size="11" fill="#3D3D3A"><tspan font-weight="600">Step 1:</tspan> Plug into the formula  →  z = (150 − 120) / 15</text>
<text x="35" y="447" font-family="sans-serif" font-size="11" fill="#3D3D3A"><tspan font-weight="600">Step 2:</tspan> Calculate  →  z = 30 / 15 = <tspan font-weight="700" fill="#993C1D">2</tspan></text>
<text x="35" y="467" font-family="sans-serif" font-size="11" fill="#3D3D3A"><tspan font-weight="600">Step 3:</tspan> Interpret  →  150 mmHg is <tspan font-weight="700" fill="#993C1D">2 standard deviations above</tspan> average</text>
<text x="35" y="487" font-family="sans-serif" font-size="11" fill="#3D3D3A"><tspan font-weight="600">Step 4:</tspan> Now you can look up z = 2 in the standard normal table to find probabilities or critical values</text>
<text x="340" y="515" font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#73726c">This same procedure works for any data — height, lab values, test scores — as long as it's normally distributed.</text>
</svg>