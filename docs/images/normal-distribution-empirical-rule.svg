<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420">
<text x="340" y="30" font-family="sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#3D3D3A">The normal distribution and the 68-95-99.7 rule</text>
<text x="340" y="50" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#73726c">How values spread around the mean in a normal distribution</text>
<path d="M 80 320 Q 130 320 160 310 Q 190 300 220 270 Q 250 235 280 175 Q 310 110 340 95 Q 370 110 400 175 Q 430 235 460 270 Q 490 300 520 310 Q 550 320 600 320 Z" fill="#85B7EB" fill-opacity="0.3" stroke="#185FA5" stroke-width="1.5"/>
<line x1="220" y1="320" x2="220" y2="265" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="4 3"/>
<line x1="280" y1="320" x2="280" y2="170" stroke="#A87B3D" stroke-width="1.5" stroke-dasharray="4 3"/>
<line x1="340" y1="320" x2="340" y2="90" stroke="#993C1D" stroke-width="2.5"/>
<line x1="400" y1="320" x2="400" y2="170" stroke="#A87B3D" stroke-width="1.5" stroke-dasharray="4 3"/>
<line x1="460" y1="320" x2="460" y2="265" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="340" y="80" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#993C1D">Mean (μ)</text>
<text x="280" y="160" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#A87B3D">−1σ</text>
<text x="400" y="160" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#A87B3D">+1σ</text>
<text x="220" y="255" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#0F6E56">−2σ</text>
<text x="460" y="255" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#0F6E56">+2σ</text>
<line x1="80" y1="320" x2="600" y2="320" stroke="#3D3D3A" stroke-width="1"/>
<text x="340" y="345" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#3D3D3A">Value</text>
<rect x="80" y="365" width="166" height="38" rx="4" fill="#FFEDD0" stroke="#A87B3D" stroke-width="1"/>
<text x="163" y="380" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#A87B3D">Within ±1σ of mean</text>
<text x="163" y="396" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#A87B3D">≈ 68% of values</text>
<rect x="257" y="365" width="166" height="38" rx="4" fill="#D6F0E2" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="380" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#0F6E56">Within ±2σ of mean</text>
<text x="340" y="396" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#0F6E56">≈ 95% of values</text>
<rect x="434" y="365" width="166" height="38" rx="4" fill="#FCE4D8" stroke="#993C1D" stroke-width="1"/>
<text x="517" y="380" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#993C1D">Within ±3σ of mean</text>
<text x="517" y="396" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#993C1D">≈ 99.7% of values</text>
</svg>