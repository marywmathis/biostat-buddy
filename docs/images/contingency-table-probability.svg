<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540">
<text x="340" y="30" font-family="sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#3D3D3A">Probability from a table: students by age and sex</text>
<text x="340" y="50" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#73726c">100 students surveyed in a community study</text>
<rect x="80" y="75" width="520" height="120" fill="#FFFFFF" stroke="#3D3D3A" stroke-width="1"/>
<rect x="80" y="75" width="80" height="40" fill="#F5F0E6" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="120" y="100" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#3D3D3A">Age</text>
<rect x="160" y="75" width="65" height="40" fill="#F5F0E6" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="192" y="100" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#3D3D3A">8</text>
<rect x="225" y="75" width="65" height="40" fill="#F5F0E6" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="257" y="100" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#3D3D3A">9</text>
<rect x="290" y="75" width="65" height="40" fill="#F5F0E6" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="322" y="100" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#3D3D3A">10</text>
<rect x="355" y="75" width="65" height="40" fill="#F5F0E6" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="387" y="100" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#3D3D3A">11</text>
<rect x="420" y="75" width="65" height="40" fill="#F5F0E6" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="452" y="100" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#3D3D3A">12</text>
<rect x="485" y="75" width="65" height="40" fill="#F5F0E6" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="517" y="100" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#3D3D3A">13</text>
<rect x="550" y="75" width="50" height="40" fill="#E8DCC2" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="575" y="100" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#3D3D3A">Total</text>
<rect x="80" y="115" width="80" height="40" fill="#F5F0E6" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="120" y="140" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#185FA5">Male</text>
<rect x="160" y="115" width="65" height="40" fill="#FFFFFF" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="192" y="140" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#3D3D3A">5</text>
<rect x="225" y="115" width="65" height="40" fill="#FFFFFF" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="257" y="140" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#3D3D3A">7</text>
<rect x="290" y="115" width="65" height="40" fill="#FFFFFF" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="322" y="140" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#3D3D3A">10</text>
<rect x="355" y="115" width="65" height="40" fill="#FFFFFF" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="387" y="140" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#3D3D3A">12</text>
<rect x="420" y="115" width="65" height="40" fill="#FFFFFF" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="452" y="140" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#3D3D3A">8</text>
<rect x="485" y="115" width="65" height="40" fill="#FFFFFF" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="517" y="140" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#3D3D3A">6</text>
<rect x="550" y="115" width="50" height="40" fill="#E8DCC2" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="575" y="140" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#185FA5">48</text>
<rect x="80" y="155" width="80" height="40" fill="#F5F0E6" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="120" y="180" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#A87B3D">Female</text>
<rect x="160" y="155" width="65" height="40" fill="#FFFFFF" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="192" y="180" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#3D3D3A">6</text>
<rect x="225" y="155" width="65" height="40" fill="#FFFFFF" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="257" y="180" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#3D3D3A">8</text>
<rect x="290" y="155" width="65" height="40" fill="#FFFFFF" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="322" y="180" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#3D3D3A">9</text>
<rect x="355" y="155" width="65" height="40" fill="#FFFFFF" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="387" y="180" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#3D3D3A">11</text>
<rect x="420" y="155" width="65" height="40" fill="#FFFFFF" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="452" y="180" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#3D3D3A">10</text>
<rect x="485" y="155" width="65" height="40" fill="#FFFFFF" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="517" y="180" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#3D3D3A">8</text>
<rect x="550" y="155" width="50" height="40" fill="#E8DCC2" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="575" y="180" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#A87B3D">52</text>
<rect x="80" y="195" width="80" height="35" fill="#E8DCC2" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="120" y="218" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#3D3D3A">Total</text>
<rect x="160" y="195" width="65" height="35" fill="#E8DCC2" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="192" y="218" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#3D3D3A">11</text>
<rect x="225" y="195" width="65" height="35" fill="#E8DCC2" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="257" y="218" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#3D3D3A">15</text>
<rect x="290" y="195" width="65" height="35" fill="#E8DCC2" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="322" y="218" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#3D3D3A">19</text>
<rect x="355" y="195" width="65" height="35" fill="#E8DCC2" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="387" y="218" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#3D3D3A">23</text>
<rect x="420" y="195" width="65" height="35" fill="#E8DCC2" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="452" y="218" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#3D3D3A">18</text>
<rect x="485" y="195" width="65" height="35" fill="#E8DCC2" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="517" y="218" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#3D3D3A">14</text>
<rect x="550" y="195" width="50" height="35" fill="#A87B3D" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="575" y="218" font-family="sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#FFFFFF">100</text>
<text x="80" y="270" font-family="sans-serif" font-size="14" font-weight="600" fill="#3D3D3A">Three example probability calculations:</text>
<rect x="80" y="285" width="160" height="170" rx="4" fill="#E6F3F0" stroke="#0F6E56" stroke-width="1"/>
<text x="160" y="305" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#0F6E56">P(Male AND age 10)</text>
<text x="160" y="325" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">Intersection (single cell)</text>
<text x="90" y="350" font-family="sans-serif" font-size="11" fill="#3D3D3A">Count Male age 10:</text>
<text x="160" y="370" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#0F6E56">10</text>
<text x="90" y="395" font-family="sans-serif" font-size="11" fill="#3D3D3A">Divide by total:</text>
<text x="160" y="415" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#3D3D3A">10 / 100</text>
<text x="160" y="442" font-family="sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#0F6E56">= 0.10</text>
<rect x="260" y="285" width="160" height="170" rx="4" fill="#FFEDD0" stroke="#A87B3D" stroke-width="1"/>
<text x="340" y="305" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#A87B3D">P(Male AND age 8 OR 12)</text>
<text x="340" y="325" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">Add two cells</text>
<text x="270" y="350" font-family="sans-serif" font-size="11" fill="#3D3D3A">Male age 8 + Male age 12:</text>
<text x="340" y="370" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#A87B3D">5 + 8 = 13</text>
<text x="270" y="395" font-family="sans-serif" font-size="11" fill="#3D3D3A">Divide by total:</text>
<text x="340" y="415" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#3D3D3A">13 / 100</text>
<text x="340" y="442" font-family="sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#A87B3D">= 0.13</text>
<rect x="440" y="285" width="160" height="170" rx="4" fill="#EBE0F0" stroke="#6B4894" stroke-width="1.5"/>
<text x="520" y="305" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#6B4894">P(age 10 | Female)</text>
<text x="520" y="325" font-family="sans-serif" font-size="10" font-weight="500" text-anchor="middle" fill="#6B4894">Only among females</text>
<text x="450" y="350" font-family="sans-serif" font-size="11" fill="#3D3D3A">Female age 10:</text>
<text x="520" y="370" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#6B4894">9</text>
<text x="450" y="395" font-family="sans-serif" font-size="11" fill="#3D3D3A">Divide by female total:</text>
<text x="520" y="415" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#3D3D3A">9 / 52</text>
<text x="520" y="442" font-family="sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#6B4894">≈ 0.17</text>
<text x="340" y="488" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#73726c" font-style="italic">The first two examples divide by the whole table (100). The third — a conditional probability —</text>
<text x="340" y="505" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#73726c" font-style="italic">divides by only the females (52), because we restricted the question to that subgroup.</text>
</svg>