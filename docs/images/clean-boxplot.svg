<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420">
<text x="370" y="30" font-family="sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#3D3D3A">Boxplot of hospital length of stay</text>
<line x1="160" y1="180" x2="160" y2="240" stroke="#185FA5" stroke-width="1.5"/>
<line x1="160" y1="210" x2="200" y2="210" stroke="#185FA5" stroke-width="1.5"/>
<rect x="200" y="180" width="120" height="60" fill="#85B7EB" stroke="#185FA5" stroke-width="1.5"/>
<line x1="260" y1="180" x2="260" y2="240" stroke="#185FA5" stroke-width="2.5"/>
<line x1="320" y1="210" x2="400" y2="210" stroke="#185FA5" stroke-width="1.5"/>
<line x1="400" y1="180" x2="400" y2="240" stroke="#185FA5" stroke-width="1.5"/>
<circle cx="640" cy="210" r="5" fill="#FFFFFF" stroke="#185FA5" stroke-width="1.5"/>
<line x1="160" y1="170" x2="160" y2="155" stroke="#73726c" stroke-width="0.5"/>
<text x="160" y="148" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">Minimum (2)</text>
<line x1="200" y1="170" x2="200" y2="125" stroke="#73726c" stroke-width="0.5"/>
<text x="200" y="118" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">Q1 (3)</text>
<line x1="260" y1="170" x2="260" y2="95" stroke="#73726c" stroke-width="0.5"/>
<text x="260" y="88" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">Median (4.5)</text>
<line x1="320" y1="170" x2="320" y2="125" stroke="#73726c" stroke-width="0.5"/>
<text x="320" y="118" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">Q3 (6)</text>
<line x1="400" y1="170" x2="400" y2="155" stroke="#73726c" stroke-width="0.5"/>
<text x="400" y="148" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">Maximum (8)</text>
<line x1="640" y1="200" x2="640" y2="155" stroke="#993C1D" stroke-width="0.5"/>
<text x="640" y="148" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#993C1D">Outlier (14)</text>
<text x="370" y="290" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#3D3D3A" font-style="italic">The box shows the middle 50% of data (the IQR)</text>
<text x="370" y="308" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#3D3D3A" font-style="italic">The whiskers extend to the min and max (excluding outliers)</text>
<line x1="80" y1="340" x2="660" y2="340" stroke="#3D3D3A" stroke-width="1"/>
<line x1="80" y1="340" x2="80" y2="345" stroke="#3D3D3A" stroke-width="0.5"/>
<line x1="160" y1="340" x2="160" y2="345" stroke="#3D3D3A" stroke-width="0.5"/>
<line x1="240" y1="340" x2="240" y2="345" stroke="#3D3D3A" stroke-width="0.5"/>
<line x1="320" y1="340" x2="320" y2="345" stroke="#3D3D3A" stroke-width="0.5"/>
<line x1="400" y1="340" x2="400" y2="345" stroke="#3D3D3A" stroke-width="0.5"/>
<line x1="480" y1="340" x2="480" y2="345" stroke="#3D3D3A" stroke-width="0.5"/>
<line x1="560" y1="340" x2="560" y2="345" stroke="#3D3D3A" stroke-width="0.5"/>
<line x1="640" y1="340" x2="640" y2="345" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="80" y="360" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#73726c">0</text>
<text x="160" y="360" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#73726c">2</text>
<text x="240" y="360" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#73726c">4</text>
<text x="320" y="360" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#73726c">6</text>
<text x="400" y="360" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#73726c">8</text>
<text x="480" y="360" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#73726c">10</text>
<text x="560" y="360" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#73726c">12</text>
<text x="640" y="360" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#73726c">14</text>
<text x="370" y="390" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#3D3D3A">Length of stay (days)</text>
</svg>