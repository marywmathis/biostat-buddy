<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420">
<text x="340" y="30" font-family="sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#3D3D3A">Sensitivity and specificity</text>
<text x="340" y="50" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#73726c">Two overlapping populations: healthy people and people with disease</text>
<circle cx="200" cy="80" r="6" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
<text x="215" y="85" font-family="sans-serif" font-size="12" fill="#3D3D3A">Healthy</text>
<circle cx="380" cy="80" r="6" fill="#D67373" stroke="#993C1D" stroke-width="0.5"/>
<text x="395" y="85" font-family="sans-serif" font-size="12" fill="#3D3D3A">Disease</text>
<path d="M 60 320 C 130 320, 160 320, 190 220 C 210 140, 225 110, 240 110 C 255 110, 270 140, 290 220 C 320 320, 350 320, 420 320 Z" fill="#85B7EB" fill-opacity="0.55" stroke="#185FA5" stroke-width="1.5"/>
<path d="M 260 320 C 330 320, 360 320, 390 220 C 410 140, 425 110, 440 110 C 455 110, 470 140, 490 220 C 520 320, 550 320, 620 320 Z" fill="#D67373" fill-opacity="0.45" stroke="#993C1D" stroke-width="1.5"/>
<line x1="340" y1="105" x2="340" y2="335" stroke="#A87B3D" stroke-width="2.5" stroke-dasharray="6 4"/>
<text x="340" y="350" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#A87B3D">Threshold</text>
<line x1="40" y1="320" x2="640" y2="320" stroke="#3D3D3A" stroke-width="1"/>
<text x="115" y="180" font-family="sans-serif" font-size="11" fill="#185FA5" text-anchor="middle">Most healthy</text>
<text x="115" y="195" font-family="sans-serif" font-size="11" fill="#185FA5" text-anchor="middle">people test</text>
<text x="115" y="210" font-family="sans-serif" font-size="11" font-weight="600" fill="#185FA5" text-anchor="middle">negative (TN)</text>
<text x="565" y="180" font-family="sans-serif" font-size="11" fill="#993C1D" text-anchor="middle">Most sick</text>
<text x="565" y="195" font-family="sans-serif" font-size="11" fill="#993C1D" text-anchor="middle">people test</text>
<text x="565" y="210" font-family="sans-serif" font-size="11" font-weight="600" fill="#993C1D" text-anchor="middle">positive (TP)</text>
<line x1="318" y1="308" x2="240" y2="240" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="220" y="230" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">Sick people</text>
<text x="220" y="216" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#993C1D">testing negative (FN)</text>
<line x1="362" y1="308" x2="440" y2="240" stroke="#3D3D3A" stroke-width="0.5"/>
<text x="460" y="230" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">Healthy people</text>
<text x="460" y="216" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#993C1D">testing positive (FP)</text>
<text x="340" y="385" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#3D3D3A">Test value (e.g., a biomarker level)</text>
<text x="340" y="408" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#73726c" font-style="italic">Moving the threshold left increases sensitivity (catches more sick people) but decreases specificity (more false alarms).</text>
</svg>