<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540">
<text x="340" y="30" font-family="sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#3D3D3A">Three "normals" — same word, three different ideas</text>
<text x="340" y="52" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#73726c">Same vocabulary, different concepts — confused every semester by every cohort</text>
<rect x="15" y="75" width="205" height="320" rx="6" fill="#EBF3FB" stroke="#185FA5" stroke-width="1.5"/>
<text x="117" y="98" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#185FA5">Normal distribution</text>
<text x="117" y="115" font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#3D3D3A">The whole family of bell curves</text>
<line x1="30" y1="280" x2="210" y2="280" stroke="#3D3D3A" stroke-width="0.8"/>
<path d="M 50 280 C 65 280, 65 145, 75 145 C 85 145, 85 280, 100 280 Z" fill="#85B7EB" fill-opacity="0.6" stroke="#185FA5" stroke-width="1.2"/>
<path d="M 70 280 C 95 280, 105 185, 115 185 C 125 185, 135 280, 160 280 Z" fill="#E8C896" fill-opacity="0.6" stroke="#A87B3D" stroke-width="1.2"/>
<path d="M 115 280 C 145 280, 160 220, 170 220 C 180 220, 195 280, 205 280 Z" fill="#D67373" fill-opacity="0.4" stroke="#993C1D" stroke-width="1.2"/>
<text x="117" y="310" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">Many different shapes,</text>
<text x="117" y="324" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">each with its own</text>
<text x="117" y="340" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#185FA5">μ (center) and σ (spread)</text>
<text x="117" y="363" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">All bell-shaped → all "normal"</text>
<text x="117" y="378" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">Just with different μ, σ</text>
<rect x="232" y="75" width="215" height="320" rx="6" fill="#FCF6E8" stroke="#A87B3D" stroke-width="1.5"/>
<text x="339" y="98" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#A87B3D">Standard normal distribution</text>
<text x="339" y="115" font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#3D3D3A">One specific curve we use as a reference</text>
<path d="M 255 280 C 290 280, 320 145, 340 145 C 360 145, 390 280, 425 280 Z" fill="#E8C896" fill-opacity="0.5" stroke="#A87B3D" stroke-width="1.5"/>
<line x1="250" y1="280" x2="430" y2="280" stroke="#3D3D3A" stroke-width="0.8"/>
<line x1="340" y1="280" x2="340" y2="140" stroke="#993C1D" stroke-width="2.5" stroke-dasharray="5 3"/>
<text x="340" y="135" font-family="sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#993C1D">μ = 0</text>
<line x1="284" y1="278" x2="284" y2="286" stroke="#3D3D3A" stroke-width="1"/>
<line x1="312" y1="278" x2="312" y2="286" stroke="#3D3D3A" stroke-width="1"/>
<line x1="340" y1="278" x2="340" y2="286" stroke="#3D3D3A" stroke-width="1.5"/>
<line x1="368" y1="278" x2="368" y2="286" stroke="#3D3D3A" stroke-width="1"/>
<line x1="396" y1="278" x2="396" y2="286" stroke="#3D3D3A" stroke-width="1"/>
<text x="284" y="299" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">−2</text>
<text x="312" y="299" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">−1</text>
<text x="340" y="299" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#993C1D">0</text>
<text x="368" y="299" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">+1</text>
<text x="396" y="299" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">+2</text>
<text x="339" y="316" font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#A87B3D">z-values (each unit = 1 σ)</text>
<text x="339" y="340" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#A87B3D">μ = 0, σ = 1 always</text>
<text x="339" y="358" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">These z-values are what you</text>
<text x="339" y="372" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">look up in the critical value table.</text>
<text x="339" y="388" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#A87B3D">z = 1.96 → 95% CI (preview!)</text>
<rect x="459" y="75" width="206" height="320" rx="6" fill="#E6F3F0" stroke="#0F6E56" stroke-width="1.5"/>
<text x="562" y="98" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#0F6E56">Normally distributed</text>
<text x="562" y="115" font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#3D3D3A">A property describing real data</text>
<line x1="475" y1="280" x2="650" y2="280" stroke="#3D3D3A" stroke-width="0.8"/>
<rect x="486" y="265" width="18" height="15" fill="#7BBBA7" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="504" y="245" width="18" height="35" fill="#7BBBA7" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="522" y="215" width="18" height="65" fill="#7BBBA7" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="540" y="180" width="18" height="100" fill="#7BBBA7" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="558" y="160" width="18" height="120" fill="#7BBBA7" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="576" y="185" width="18" height="95" fill="#7BBBA7" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="594" y="220" width="18" height="60" fill="#7BBBA7" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="612" y="250" width="18" height="30" fill="#7BBBA7" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="630" y="270" width="18" height="10" fill="#7BBBA7" stroke="#0F6E56" stroke-width="0.5"/>
<path d="M 490 275 C 510 275, 540 160, 567 160 C 595 160, 625 275, 645 275" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="562" y="310" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">Actual data values from a</text>
<text x="562" y="324" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">sample (the bars) that follow</text>
<text x="562" y="345" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#0F6E56">a normal distribution shape</text>
<text x="562" y="365" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">e.g., blood pressure, height,</text>
<text x="562" y="379" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3D3D3A">test scores, lab values</text>
<rect x="15" y="410" width="650" height="120" rx="6" fill="#F5F0E6" stroke="#73726c" stroke-width="0.5"/>
<text x="340" y="432" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#3D3D3A">How they fit together</text>
<text x="35" y="453" font-family="sans-serif" font-size="11" fill="#3D3D3A"><tspan font-weight="600" fill="#185FA5">Normal distribution</tspan> is the family. <tspan font-weight="600" fill="#A87B3D">Standard normal</tspan> is one specific curve from that family — μ=0, σ=1.</text>
<text x="35" y="471" font-family="sans-serif" font-size="11" fill="#3D3D3A">When you have real <tspan font-weight="600" fill="#0F6E56">data that's normally distributed</tspan>, you're saying the data's shape matches some curve in</text>
<text x="35" y="487" font-family="sans-serif" font-size="11" fill="#3D3D3A">the normal-distribution family.</text>
<text x="35" y="513" font-family="sans-serif" font-size="11" fill="#3D3D3A" font-style="italic">We use the <tspan font-weight="600" fill="#A87B3D">standard normal</tspan> as a tool to look things up — but we apply it to all kinds of <tspan font-weight="600" fill="#0F6E56">real data</tspan>.</text>
</svg>