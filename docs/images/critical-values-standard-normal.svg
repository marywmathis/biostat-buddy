<text x="516" y="115" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#993C1D">z = +1.96</text>
<text x="110" y="305" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#993C1D">2.5%</text>
<text x="570" y="305" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#993C1D">2.5%</text>
