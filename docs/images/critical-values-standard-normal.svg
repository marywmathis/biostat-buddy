<text x="500" y="498" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#185FA5">2.576</text>
<text x="340" y="518" font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#73726c">★ 1.96 is the most-used critical value in all of statistics — worth memorizing.</text>
