<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540">
<text x="340" y="30" font-family="sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#3D3D3A">Where does 1.96 come from? Critical values on the standard normal</text>
<text x="340" y="52" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#73726c">The critical value z* = 1.96 cuts off the middle 95% of the standard normal distribution</text>
