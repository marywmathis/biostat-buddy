<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540">
<defs>
<clipPath id="zL"><rect x="15" y="0" width="84" height="540"/></clipPath>
<clipPath id="zM"><rect x="99" y="0" width="156" height="540"/></clipPath>
<clipPath id="zR"><rect x="255" y="0" width="80" height="540"/></clipPath>
<clipPath id="tL"><rect x="345" y="0" width="57" height="540"/></clipPath>
<clipPath id="tM"><rect x="402" y="0" width="206" height="540"/></clipPath>
<clipPath id="tR"><rect x="608" y="0" width="57" height="540"/></clipPath>
</defs>
<text x="340" y="30" font-family="sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#3D3D3A">Why t and z have different critical values</text>
<text x="340" y="52" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#73726c">Both panels cut off 2.5% in each tail — but t must extend further out</text>
<rect x="15" y="75" width="320" height="280" rx="6" fill="#EBF3FB" stroke="#185FA5" stroke-width="1.5"/>
<text x="175" y="98" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#185FA5">Standard normal (z)</text>
<text x="175" y="115" font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#3D3D3A">Cut off the middle 95% → critical value at z = ±1.96</text>
<path d="M 37 315 C 100 315, 150 130, 177 130 C 204 130, 254 315, 317 315 L 317 315 L 37 315 Z" fill="#D67373" fill-opacity="0.55" clip-path="url(#zL)"/>
<path d="M 37 315 C 100 315, 150 130, 177 130 C 204 130, 254 315, 317 315 L 317 315 L 37 315 Z" fill="#85B7EB" fill-opacity="0.6" clip-path="url(#zM)"/>
<path d="M 37 315 C 100 315, 150 130, 177 130 C 204 130, 254 315, 317 315 L 317 315 L 37 315 Z" fill="#D67373" fill-opacity="0.55" clip-path="url(#zR)"/>
<path d="M 37 315 C 100 315, 150 130, 177 130 C 204 130, 254 315, 317 315" fill="none" stroke="#185FA5" stroke-width="1.5"/>
<line x1="99" y1="315" x2="99" y2="160" stroke="#993C1D" stroke-width="2" stroke-dasharray="4 3"/>
<line x1="255" y1="315" x2="255" y2="160" stroke="#993C1D" stroke-width="2" stroke-dasharray="4 3"/>
<text x="177" y="200" font-family="sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="#185FA5">95%</text>
<text x="60" y="307" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#993C1D">2.5%</text>
<text x="295" y="307" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#993C1D">2.5%</text>
<text x="99" y="155" font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#993C1D">z = −1.96</text>
<text x="255" y="155" font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#993C1D">z = +1.96</text>
<line x1="40" y1="315" x2="315" y2="315" stroke="#3D3D3A" stroke-width="0.8"/>
<text x="177" y="345" font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#3D3D3A">Standardized value</text>
<rect x="345" y="75" width="320" height="280" rx="6" fill="#FCEFE2" stroke="#993C1D" stroke-width="1.5"/>
<text x="505" y="98" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#993C1D">t-distribution (df = 5)</text>
<text x="505" y="115" font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#3D3D3A">Cut off the middle 95% → critical value at t = ±2.571</text>
<path d="M 365 315 C 425 315, 480 145, 505 145 C 530 145, 585 315, 645 315 L 645 315 L 365 315 Z" fill="#D67373" fill-opacity="0.55" clip-path="url(#tL)"/>
<path d="M 365 315 C 425 315, 480 145, 505 145 C 530 145, 585 315, 645 315 L 645 315 L 365 315 Z" fill="#85B7EB" fill-opacity="0.6" clip-path="url(#tM)"/>
<path d="M 365 315 C 425 315, 480 145, 505 145 C 530 145, 585 315, 645 315 L 645 315 L 365 315 Z" fill="#D67373" fill-opacity="0.55" clip-path="url(#tR)"/>
<path d="M 365 315 C 425 315, 480 145, 505 145 C 530 145, 585 315, 645 315" fill="none" stroke="#993C1D" stroke-width="1.5"/>
<line x1="402" y1="315" x2="402" y2="175" stroke="#993C1D" stroke-width="2" stroke-dasharray="4 3"/>
<line x1="608" y1="315" x2="608" y2="175" stroke="#993C1D" stroke-width="2" stroke-dasharray="4 3"/>
<text x="505" y="215" font-family="sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="#185FA5">95%</text>
<text x="378" y="307" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#993C1D">2.5%</text>
<text x="630" y="307" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#993C1D">2.5%</text>
<text x="402" y="170" font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#993C1D">t = −2.571</text>
<text x="608" y="170" font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#993C1D">t = +2.571</text>
<line x1="365" y1="315" x2="645" y2="315" stroke="#3D3D3A" stroke-width="0.8"/>
<text x="505" y="345" font-family="sans-serif" font-size="11" font-style="italic" text-anchor="middle" fill="#3D3D3A">Standardized value</text>
<rect x="20" y="370" width="640" height="155" rx="6" fill="#F5F0E6" stroke="#73726c" stroke-width="0.5"/>
<text x="340" y="392" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#3D3D3A">The takeaway: heavier tails → larger critical values</text>
<text x="340" y="415" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">Because t has more probability spread out in the tails, we go further out to cover 95%.</text>
<text x="340" y="432" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">That's why <tspan font-weight="700" fill="#993C1D">2.571 &gt; 1.96</tspan>.</text>
<line x1="80" y1="452" x2="600" y2="452" stroke="#73726c" stroke-width="0.5" stroke-dasharray="3 3"/>
<text x="170" y="474" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#3D3D3A">df</text>
<text x="510" y="474" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#3D3D3A">95% critical value</text>
<text x="170" y="491" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#993C1D">5 (small sample)</text>
<text x="510" y="491" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#993C1D">t* = 2.571</text>
<text x="170" y="506" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">30</text>
<text x="510" y="506" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#3D3D3A">t* = 2.042</text>
<text x="170" y="521" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#185FA5">∞ (huge sample)</text>
<text x="510" y="521" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#185FA5">z* = 1.960</text>
</svg>