<text x="580" y="245" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#73726c">Mean</text>
<line x1="623" y1="50" x2="623" y2="215" stroke="#0F6E56" stroke-width="2"/>
<text x="623" y="260" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#73726c">Median</text>

<text x="340" y="295" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#73726c">The mean gets pulled toward the tail. The median stays with the bulk of the data.</text>
</svg>