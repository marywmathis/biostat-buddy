<rect x="40" y="170" width="15" height="40" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
<rect x="58" y="140" width="15" height="70" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
