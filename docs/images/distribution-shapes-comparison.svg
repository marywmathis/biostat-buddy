<rect x="337" y="150" width="15" height="60" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
<rect x="355" y="170" width="15" height="40" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
