<text x="119" y="245" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#73726c">Mean ≈ Median</text>

<text x="338" y="30" font-family="sans-serif" font-size="14" font-weight="500" text-anchor="middle" fill="#3D3D3A">Right-skewed</text>
<rect x="265" y="100" width="15" height="110" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
<rect x="283" y="60" width="15" height="150" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
<rect x="301" y="80" width="15" height="130" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
