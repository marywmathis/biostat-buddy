<text x="345" y="260" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#73726c">Mean</text>

<text x="563" y="30" font-family="sans-serif" font-size="14" font-weight="500" text-anchor="middle" fill="#3D3D3A">Left-skewed</text>
<rect x="490" y="195" width="15" height="15" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
<rect x="508" y="190" width="15" height="20" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
<rect x="526" y="180" width="15" height="30" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
<rect x="544" y="170" width="15" height="40" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
<rect x="562" y="150" width="15" height="60" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
<rect x="580" y="120" width="15" height="90" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
<rect x="598" y="80" width="15" height="130" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
