<svg width="100%" viewBox="0 0 700 470" xmlns="http://www.w3.org/2000/svg" role="img"><title>Rank transformation</title>

<text x="350" y="22" font-family="sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#3D3D3A">From raw values to ranks</text>
<text x="350" y="44" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#73726c">How nonparametric tests turn data into positions</text>

<text x="50" y="78" font-family="sans-serif" font-size="11" font-weight="700" fill="#3D3D3A">Step 1.</text>
<text x="100" y="78" font-family="sans-serif" font-size="11" fill="#3D3D3A">Start with the raw data from both groups.</text>
<rect x="50" y="86" width="600" height="56" rx="4" fill="#FAFAFA" stroke="#73726c" stroke-width="0.4"/>
<text x="65" y="108" font-family="sans-serif" font-size="11" font-weight="700" fill="#185FA5">Hospital A:</text>
<text x="160" y="108" font-family="monospace" font-size="13" fill="#185FA5">2  ·  3  ·  4  ·  5  ·  6  ·  8  ·  9  ·  50</text>
<text x="65" y="130" font-family="sans-serif" font-size="11" font-weight="700" fill="#993C1D">Hospital B:</text>
<text x="160" y="130" font-family="monospace" font-size="13" fill="#993C1D">7  ·  10 ·  11 ·  12 ·  13 ·  14 ·  15 ·  17</text>

<text x="50" y="170" font-family="sans-serif" font-size="11" font-weight="700" fill="#3D3D3A">Step 2.</text>
<text x="100" y="170" font-family="sans-serif" font-size="11" fill="#3D3D3A">Combine all 16 values, sort smallest to largest, assign ranks 1 to 16.</text>

<rect x="50" y="180" width="600" height="105" rx="4" fill="#FAFAFA" stroke="#73726c" stroke-width="0.4"/>
<line x1="78" y1="232" x2="623" y2="232" stroke="#3D3D3A" stroke-width="1"/>

<text x="60" y="216" font-family="sans-serif" font-size="10" text-anchor="end" fill="#5F5E5A">value</text>
<text x="60" y="256" font-family="sans-serif" font-size="10" text-anchor="end" fill="#5F5E5A">rank</text>

<text x="88" y="216" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#185FA5">2</text>
<circle cx="88" cy="232" r="5" fill="#185FA5"/>
<text x="88" y="256" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#3D3D3A">1</text>

<text x="123" y="216" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#185FA5">3</text>
<circle cx="123" cy="232" r="5" fill="#185FA5"/>
<text x="123" y="256" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#3D3D3A">2</text>

<text x="158" y="216" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#185FA5">4</text>
<circle cx="158" cy="232" r="5" fill="#185FA5"/>
<text x="158" y="256" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#3D3D3A">3</text>

<text x="193" y="216" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#185FA5">5</text>
<circle cx="193" cy="232" r="5" fill="#185FA5"/>
<text x="193" y="256" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#3D3D3A">4</text>

<text x="228" y="216" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#185FA5">6</text>
<circle cx="228" cy="232" r="5" fill="#185FA5"/>
<text x="228" y="256" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#3D3D3A">5</text>

<text x="263" y="216" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#993C1D">7</text>
<circle cx="263" cy="232" r="5" fill="#993C1D"/>
<text x="263" y="256" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#3D3D3A">6</text>

<text x="298" y="216" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#185FA5">8</text>
<circle cx="298" cy="232" r="5" fill="#185FA5"/>
<text x="298" y="256" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#3D3D3A">7</text>

<text x="333" y="216" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#185FA5">9</text>
<circle cx="333" cy="232" r="5" fill="#185FA5"/>
<text x="333" y="256" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#3D3D3A">8</text>

<text x="368" y="216" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#993C1D">10</text>
<circle cx="368" cy="232" r="5" fill="#993C1D"/>
<text x="368" y="256" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#3D3D3A">9</text>

<text x="403" y="216" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#993C1D">11</text>
<circle cx="403" cy="232" r="5" fill="#993C1D"/>
<text x="403" y="256" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#3D3D3A">10</text>

<text x="438" y="216" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#993C1D">12</text>
<circle cx="438" cy="232" r="5" fill="#993C1D"/>
<text x="438" y="256" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#3D3D3A">11</text>

<text x="473" y="216" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#993C1D">13</text>
<circle cx="473" cy="232" r="5" fill="#993C1D"/>
<text x="473" y="256" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#3D3D3A">12</text>

<text x="508" y="216" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#993C1D">14</text>
<circle cx="508" cy="232" r="5" fill="#993C1D"/>
<text x="508" y="256" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#3D3D3A">13</text>

<text x="543" y="216" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#993C1D">15</text>
<circle cx="543" cy="232" r="5" fill="#993C1D"/>
<text x="543" y="256" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#3D3D3A">14</text>

<text x="578" y="216" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#993C1D">17</text>
<circle cx="578" cy="232" r="5" fill="#993C1D"/>
<text x="578" y="256" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#3D3D3A">15</text>

<text x="613" y="216" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#185FA5">50</text>
<circle cx="613" cy="232" r="6.5" fill="#185FA5" stroke="#0A2B4A" stroke-width="1.5"/>
<text x="613" y="256" font-family="sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#3D3D3A">16</text>

<text x="50" y="307" font-family="sans-serif" font-size="11" font-weight="700" fill="#3D3D3A">Step 3.</text>
<text x="100" y="307" font-family="sans-serif" font-size="11" fill="#3D3D3A">Sum the ranks within each group.</text>

<rect x="50" y="317" width="600" height="65" rx="4" fill="#FAFAFA" stroke="#73726c" stroke-width="0.4"/>
<text x="65" y="338" font-family="sans-serif" font-size="11" font-weight="700" fill="#185FA5">Hospital A:</text>
<text x="160" y="338" font-family="monospace" font-size="12" fill="#185FA5">1 + 2 + 3 + 4 + 5 + 7 + 8 + 16</text>
<text x="455" y="338" font-family="monospace" font-size="12" font-weight="700" fill="#185FA5">=  46</text>
<text x="65" y="365" font-family="sans-serif" font-size="11" font-weight="700" fill="#993C1D">Hospital B:</text>
<text x="160" y="365" font-family="monospace" font-size="12" fill="#993C1D">6 + 9 + 10 + 11 + 12 + 13 + 14 + 15</text>
<text x="455" y="365" font-family="monospace" font-size="12" font-weight="700" fill="#993C1D">=  90</text>

<rect x="50" y="402" width="600" height="58" rx="4" fill="#F5F0E6" stroke="#A87B3D" stroke-width="0.8"/>
<text x="350" y="422" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#3D3D3A">Mann-Whitney compares these rank sums, not the means.</text>
<text x="350" y="441" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">The outlier in Hospital A (the 50, circled above) is just "rank 16" here —</text>
<text x="350" y="455" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#3D3D3A">its raw magnitude cannot dominate the test the way it would a t-test.</text>
</svg>