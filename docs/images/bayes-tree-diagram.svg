<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480">
<text x="340" y="30" font-family="sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#3D3D3A">Tree diagram: how a screening test plays out</text>
<text x="340" y="50" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#73726c">Starting with 10,000 people in a population (5% disease prevalence)</text>
<circle cx="100" cy="240" r="22" fill="#85B7EB" stroke="#185FA5" stroke-width="1.5"/>
<text x="100" y="245" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#FFFFFF">10,000</text>
<text x="100" y="285" font-family="sans-serif" font-size="12" font-weight="500" text-anchor="middle" fill="#3D3D3A">Population</text>
<line x1="125" y1="232" x2="270" y2="155" stroke="#185FA5" stroke-width="1.5"/>
<line x1="125" y1="248" x2="270" y2="325" stroke="#185FA5" stroke-width="1.5"/>
<text x="150" y="175" font-family="sans-serif" font-size="11" font-weight="500" fill="#185FA5">Prevalence</text>
<text x="150" y="190" font-family="sans-serif" font-size="11" font-weight="500" fill="#185FA5">= 5%</text>
<text x="150" y="310" font-family="sans-serif" font-size="11" font-weight="500" fill="#185FA5">No disease</text>
<text x="150" y="325" font-family="sans-serif" font-size="11" font-weight="500" fill="#185FA5">= 95%</text>
<circle cx="295" cy="145" r="22" fill="#D67373" stroke="#993C1D" stroke-width="1.5"/>
<text x="295" y="150" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#FFFFFF">500</text>
<text x="295" y="195" font-family="sans-serif" font-size="12" font-weight="500" text-anchor="middle" fill="#993C1D">Has disease (D+)</text>
<circle cx="295" cy="335" r="22" fill="#7BBBA7" stroke="#0F6E56" stroke-width="1.5"/>
<text x="295" y="340" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#FFFFFF">9,500</text>
<text x="295" y="385" font-family="sans-serif" font-size="12" font-weight="500" text-anchor="middle" fill="#0F6E56">No disease (D−)</text>
<line x1="320" y1="135" x2="465" y2="100" stroke="#993C1D" stroke-width="1.5"/>
<line x1="320" y1="155" x2="465" y2="200" stroke="#993C1D" stroke-width="1.5"/>
<text x="385" y="103" font-family="sans-serif" font-size="11" font-weight="500" text-anchor="middle" fill="#993C1D">Test+ (Se = 90%)</text>
<text x="385" y="190" font-family="sans-serif" font-size="11" font-weight="500" text-anchor="middle" fill="#993C1D">Test− (10%)</text>
<line x1="320" y1="325" x2="465" y2="270" stroke="#0F6E56" stroke-width="1.5"/>
<line x1="320" y1="345" x2="465" y2="400" stroke="#0F6E56" stroke-width="1.5"/>
<text x="385" y="285" font-family="sans-serif" font-size="11" font-weight="500" text-anchor="middle" fill="#0F6E56">Test+ (5%)</text>
<text x="385" y="385" font-family="sans-serif" font-size="11" font-weight="500" text-anchor="middle" fill="#0F6E56">Test− (Sp = 95%)</text>
<rect x="470" y="85" width="160" height="40" rx="4" fill="#0F6E56" stroke="#0F6E56" stroke-width="1"/>
<text x="550" y="103" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#FFFFFF">True Positives</text>
<text x="550" y="118" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">450</text>
<rect x="470" y="185" width="160" height="40" rx="4" fill="#D67373" stroke="#993C1D" stroke-width="1"/>
<text x="550" y="203" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#FFFFFF">False Negatives</text>
<text x="550" y="218" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">50</text>
<rect x="470" y="255" width="160" height="40" rx="4" fill="#D67373" stroke="#993C1D" stroke-width="1"/>
<text x="550" y="273" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#FFFFFF">False Positives</text>
<text x="550" y="288" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">475</text>
<rect x="470" y="385" width="160" height="40" rx="4" fill="#0F6E56" stroke="#0F6E56" stroke-width="1"/>
<text x="550" y="403" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#FFFFFF">True Negatives</text>
<text x="550" y="418" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">9,025</text>
<text x="80" y="460" font-family="sans-serif" font-size="11" fill="#3D3D3A" font-style="italic">PPV = TP / (TP + FP) = 450 / (450 + 475) = </text>
<text x="370" y="460" font-family="sans-serif" font-size="11" font-weight="700" fill="#185FA5">48.6%</text>
<text x="430" y="460" font-family="sans-serif" font-size="11" fill="#3D3D3A" font-style="italic"> (chance of having disease given Test+)</text>
</svg>